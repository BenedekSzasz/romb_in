<!DOCTYPE html>
<html lang="HU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sip</title>
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Rombusz Területe és Kerülete</h1>
    <form id="rhombusForm"> 
      <div class="input">
        <label for="side" class="form-label">Oldal</label>
        <input type="text" class="form-control" id="side">
      </div>

      <div class="input">
        <label for="alpha-angle" class="form-label">Alfa szög</label>
        <input type="text" class="form-control" id="alpha-angle">
      </div>

      <button type="submit" class="btn btn-primary mt-2">Kiszámít</button>


      <div class="input">
        <label for="perimeter" class="form-label">Kerület</label>
        <input type="text" class="form-control" id="perimeter">
      </div>

      <div class="input">
        <label for="area" class="form-label">Terület</label>
        <input type="text" class="form-control" id="area">
      </div>
    </form>
  </div>
  <script src="bootstrap.js"></script>
  <script type = "module" src="app.js"></script>  
</body>
</html>
